<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 학교 대시보드</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { margin-bottom: 20px; border-radius: 15px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .timetable-slot { padding: 10px; border-bottom: 1px solid #eee; }
        .btn-insta { background: linear-gradient(45deg, #405de6, #5851db, #833ab4, #c13584, #e1306c, #fd1d1d); color: white; border: none; }
    </style>
</head>
<body>

<div class="container mt-4" id="app">
    <div id="login-section" style="display: none;">
        <div class="card p-4 text-center">
            <h3>학번을 입력하세요</h3>
            <input type="text" id="input-id" class="form-control mb-3" placeholder="예: 30101">
            <div class="mb-3">
                <label class="me-3"><input type="checkbox" id="check-brk"> 조식 보기</label>
                <label><input type="checkbox" id="check-din"> 석식 보기</label>
            </div>
            <button class="btn btn-primary" onclick="saveAndStart()">시작하기</button>
        </div>
    </div>

    <div id="dashboard-section" style="display: none;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 id="user-info">로딩 중...</h2>
            <button class="btn btn-sm btn-outline-danger" onclick="resetUser()">학번 변경</button>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="card p-3">
                    <h5 class="fw-bold mb-3">📅 오늘 시간표</h5>
                    <div id="timetable-content">데이터를 불러오는 중...</div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card p-3">
                    <h5 class="fw-bold mb-3">🍴 오늘 급식</h5>
                    <div id="meal-content">데이터를 불러오는 중...</div>
                </div>
            </div>
        </div>

        <div class="text-center mt-4 mb-5">
            <button class="btn btn-secondary me-2" onclick="copyLink()">링크 복사</button>
            <a href="https://instagram.com/학교아이디" target="_blank" class="btn btn-insta">인스타그램</a>
        </div>
    </div>
</div>

<script>
// --- [1. 설정 및 파라미터 처리] ---
const API_URL = "성공한_웹_앱_URL"; // 여기에 아까 성공한 URL을 넣으세요.
const params = new URLSearchParams(window.location.search);
let id = params.get('id');
let setting = params.get('setting') || "00";

// --- [2. 초기 구동 로직] ---
window.onload = function() {
    if (!id) {
        document.getElementById('login-section').style.display = 'block';
    } else {
        document.getElementById('dashboard-section').style.display = 'block';
        loadAllData();
    }
}

// 학번 저장 및 페이지 이동
function saveAndStart() {
    const inputId = document.getElementById('input-id').value;
    const brk = document.getElementById('check-brk').checked ? "1" : "0";
    const din = document.getElementById('check-din').checked ? "1" : "0";
    if (inputId) {
        window.location.href = `?id=${inputId}&setting=${brk}${din}`;
    }
}

// 학번 초기화
function resetUser() {
    window.location.href = window.location.pathname;
}

// --- [3. 데이터 로드 및 렌더링] ---
async function loadAllData() {
    try {
        const response = await fetch(`${API_URL}?id=${id}`);
        const data = await response.json();
        
        document.getElementById('user-info').innerText = `${id} 학생 대시보드`;

        // 요일 및 날짜 구하기
        const now = new Date();
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const todayDay = days[now.getDay()]; // 예: Monday
        const todayDateNum = "260303"; // 테스트용 날짜 (실제로는 날짜 포맷팅 함수 필요)

        // 시간표 렌더링
        renderTimetable(data.myTimetable, todayDay);
        // 급식 렌더링
        renderMeal(data.meals, todayDateNum, setting);

    } catch (e) {
        alert("데이터 로딩 실패!");
    }
}

function renderTimetable(timetable, day) {
    const content = document.getElementById('timetable-content');
    if (!timetable || !timetable[day]) {
        content.innerText = "오늘 시간표가 없습니다.";
        return;
    }
    
    let html = "";
    timetable[day].forEach((sub, idx) => {
        if(sub) html += `<div class="timetable-slot"><b>${idx+1}교시:</b> ${sub}</div>`;
    });
    content.innerHTML = html || "수업이 없습니다.";
}

function renderMeal(meals, dateNum, setting) {
    const content = document.getElementById('meal-content');
    const todayMeal = meals.find(m => m.date === dateNum);
    if (!todayMeal) {
        content.innerText = "오늘 급식 정보가 없습니다.";
        return;
    }

    let html = "";
    if (setting[0] === "1") html += `<p><b>🍳 조식:</b> ${todayMeal.breakfast}</p>`;
    html += `<p><b>🍱 중식:</b> ${todayMeal.lunch}</p>`;
    if (setting[1] === "1") html += `<p><b>🍛 석식:</b> ${todayMeal.dinner}</p>`;
    
    content.innerHTML = html;
}

function copyLink() {
    navigator.clipboard.writeText(window.location.href);
    alert("내 설정이 포함된 링크가 복사되었습니다!");
}
</script>

</body>
</html>
